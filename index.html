<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
        }

        /* LEFT SIDEBAR */
        nav {
            width: 200px;
            height: 100vh;
            background: #111;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 20px;
        }

        nav ul {
            list-style: none;
            padding: 0;
        }

        nav ul li {
            margin: 20px 0;
            text-align: center;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            display: block;
            padding: 10px;
        }

        nav ul li a:hover {
            background: orange;
            color: black;
        }

        /* MAIN CONTENT */
        .content {
            margin-left: 200px;
            padding: 20px;
            width: 100%;
        }

        section {
            height: 100vh;
            padding-top: 50px;
        }

        h1, h2 {
            color: orange;
        }

        button {
            padding: 10px 20px;
            background: orange;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- SIDEBAR NAV -->
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="content">

        <section id="home">
            <h1>Welcome to My Website</h1>
            <p>This is my homepage.</p>
            <button onclick="sayHello()">Click Me</button>
        </section>

        <section id="about">
            <h2>About Me</h2>
            <p>I am learning web development using GitHub.</p>
        </section>

        <section id="projects">
            <h2>Projects</h2>
            <p>My future projects will appear here.</p>
        </section>

        <section id="contact">
            <h2>Contact</h2>
            <p>Email: your@email.com</p>
        </section>

    </div>

    <script>
        function sayHello() {
            alert("Hello! Welcome to my website!");
        }
    </script>

</body>
</html>
